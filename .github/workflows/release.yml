name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release package
        run: bash scripts/package-app.sh --target x86_64-unknown-linux-gnu

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillystage-linux-x86_64
          path: dist/sillystage-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release package
        shell: pwsh
        run: ./scripts/package-app.ps1 -Target x86_64-pc-windows-msvc

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillystage-windows-x86_64
          path: dist/sillystage-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS Package (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release package
        run: bash scripts/package-app.sh --target ${{ matrix.target }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillystage-macos-${{ matrix.target }}
          path: dist/sillystage-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/sillystage-x86_64-unknown-linux-gnu.tar.gz
            release-assets/sillystage-x86_64-pc-windows-msvc.zip
            release-assets/sillystage-aarch64-apple-darwin.tar.gz
            release-assets/sillystage-x86_64-apple-darwin.tar.gz
          fail_on_unmatched_files: true
